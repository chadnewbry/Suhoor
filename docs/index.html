<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suhoor — Your Ramadan Companion</title>
    <style>
        :root { --bg: #1a1a2e; --surface: #16213e; --gold: #d4a54a; --text: #e8e8e8; --muted: #a0a0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; padding: 48px 24px; text-align: center; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 2em; color: var(--gold); margin-bottom: 8px; }
        .tagline { color: var(--muted); font-size: 1.1em; margin-bottom: 32px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a { color: var(--gold); text-decoration: none; padding: 10px 20px; border: 1px solid var(--gold); border-radius: 8px; transition: all 0.2s; }
        .links a:hover { background: var(--gold); color: var(--bg); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🌙</div>
        <h1>Suhoor</h1>
        <p class="tagline">Your Ramadan Companion</p>
        <div class="links">
            <a href="privacy">Privacy Policy</a>
            <a href="terms">Terms of Service</a>
            <a href="support">Support</a>
        </div>
    </div>
</body>
</html>
