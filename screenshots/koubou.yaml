# Koubou screenshot composition config for Suhoor
# App theme: Ramadan fasting/meal timing, Islamic

device: "iPhone 15 Pro Portrait"
output_size: "iPhone6_9"

screenshots:
  - name: "01_fasting_timer"
    source: "raw/01_fasting_timer.png"
    background:
      gradient:
        top: "#1A237E"
        bottom: "#4A148C"
    headline:
      text: "Track Your Fast"
      color: "#FFD54F"
      font_weight: bold
    subtitle:
      text: "Live countdown to Iftar and Suhoor"
      color: "#FFF176"

  - name: "02_prayer_times"
    source: "raw/02_prayer_times.png"
    background:
      gradient:
        top: "#0D47A1"
        bottom: "#1565C0"
    headline:
      text: "Never Miss a Prayer"
      color: "#FFE082"
      font_weight: bold
    subtitle:
      text: "Accurate prayer times for your location"
      color: "#FFECB3"

  - name: "03_meal_planning"
    source: "raw/03_meal_planning.png"
    background:
      gradient:
        top: "#1B5E20"
        bottom: "#2E7D32"
    headline:
      text: "Plan Your Meals"
      color: "#FFD54F"
      font_weight: bold
    subtitle:
      text: "Suhoor and Iftar meal suggestions"
      color: "#FFF9C4"

  - name: "04_ramadan_tracker"
    source: "raw/04_ramadan_tracker.png"
    background:
      gradient:
        top: "#311B92"
        bottom: "#4527A0"
    headline:
      text: "Your Ramadan Journey"
      color: "#FFD54F"
      font_weight: bold
    subtitle:
      text: "Track fasting days and spiritual goals"
      color: "#FFF176"

  - name: "05_widgets"
    source: "raw/05_widgets.png"
    background:
      gradient:
        top: "#004D40"
        bottom: "#00695C"
    headline:
      text: "Glanceable Widgets"
      color: "#FFE082"
      font_weight: bold
    subtitle:
      text: "Fasting status right on your Home Screen"
      color: "#FFECB3"

  - name: "06_settings"
    source: "raw/06_settings.png"
    background:
      gradient:
        top: "#263238"
        bottom: "#37474F"
    headline:
      text: "Fully Customizable"
      color: "#B2DFDB"
      font_weight: bold
    subtitle:
      text: "Tailor notifications and preferences"
      color: "#80CBC4"
