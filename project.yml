name: Suhoor
options:
  bundleIdPrefix: com.chadnewbry
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: XHKABG374
    CODE_SIGN_STYLE: Automatic

targets:
  Suhoor:
    type: application
    platform: iOS
    sources:
      - Suhoor
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.chadnewbry.suhoor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIBackgroundModes: "audio"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Suhoor needs your location to calculate accurate prayer times and Qibla direction."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Suhoor can track your fasting hours in Apple Health."
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: Suhoor/Suhoor.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.chadnewbry.suhoor
    dependencies:
      - target: SuhoorWidgets
        embed: true

  SuhoorWidgets:
    type: app-extension
    platform: iOS
    sources:
      - SuhoorWidgets
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.chadnewbry.suhoor.widgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    entitlements:
      path: SuhoorWidgets/SuhoorWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.chadnewbry.suhoor

  SuhoorWatch:
    type: application
    platform: watchOS
    sources:
      - path: SuhoorWatch/SuhoorWatchApp
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.chadnewbry.suhoor.watchapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
